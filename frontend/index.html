<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens — Truth as a Service</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/analyzer.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <!-- Background -->
    <div class="grid-bg"></div>

    <!-- Global Loader -->
    <div id="global-loader" class="loader-overlay" style="display:none;">
        <div class="spinner"></div>
        <div class="loader-text">SYNCING WITH NEURAL NETWORK...</div>
    </div>

    <!-- Success Toast -->
    <div id="toast">
        <span class="icon">✓</span>
        <span class="msg" id="toast-msg">PROTOCOL SUCCESSFUL</span>
    </div>

    <div class="container">
        <!-- Components injected here -->
        <div id="nav-wrapper"></div>

        <!-- Dynamic Content -->
        <main id="main-content">
            <div id="page-content"></div>
        </main>

        <!-- Dynamic Modals -->
        <div id="modals-wrapper"></div>
    </div>

    <!-- Core Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/history.js"></script>
    <script src="js/main.js"></script>
</body>

</html>

<section id="page-profile" class="page">
    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-card tilt-card">
                <div class="avatar-container">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Truth" id="prof-photo-display" alt="Avatar">
                </div>
                <h3 id="prof-name-display">Operative Name</h3>
                <p id="prof-email-display">email@example.com</p>
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-val" id="prof-count">0</span>
                        <span class="stat-label">Analyses</span>
                    </div>
                </div>
            </div>
            <div class="profile-card tilt-card" style="margin-top: 20px;">
                <h4 style="font-size: 10px; color: var(--muted); margin-bottom: 10px;">OPERATIVE IDENTITY KEY</h4>
                <div id="prof-id-display"
                    style="font-size: 10px; color: var(--accent); font-family: 'DM Mono', monospace; word-break: break-all; margin-bottom: 15px;">
                    00000000-0000-0000-0000-000000000000</div>
                <button class="btn" style="width:100%; font-size: 10px; padding: 8px;"
                    onclick="requestIdentityKey()">RETRIEVE VIA EMAIL</button>
            </div>

            <button class="btn danger-btn" onclick="openModal('delete-modal')"
                style="width:100%; margin-top:20px;">DELETE ACCOUNT</button>
        </div>

        <div class="profile-main">
            <div id="deletion-warning" class="profile-card danger-card"
                style="display:none; border-color: var(--danger); background: rgba(255, 62, 108, 0.05); margin-bottom: 25px;">
                <h3 style="color:var(--danger); font-size: 14px; margin-bottom: 10px;">⚡ NEUTRALIZATION PROTOCOL ACTIVE
                </h3>
                <p style="font-size: 12px; margin-bottom: 15px;">This node is scheduled for permanent purge on: <strong
                        id="deletion-date">...</strong></p>
                <button class="btn solid danger-btn" onclick="cancelDeletion()"
                    style="padding: 8px 20px; font-size: 11px;">CANCEL NEUTRALIZATION & RECOVER NODE</button>
            </div>

            <div class="form-container">
                <h3>Update Protocol</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>FULL NAME</label>
                        <input type="text" id="upd-name">
                    </div>
                    <div class="form-group">
                        <label>MOBILE NUMBER</label>
                        <input type="text" id="upd-phone" placeholder="+91 00000 00000">
                    </div>
                </div>
                <div class="form-group">
                    <label>LINKEDIN PROFILE URL</label>
                    <input type="url" id="upd-linkedin" placeholder="https://linkedin.com/in/...">
                </div>
                <div class="form-group">
                    <label>PHOTO URL (OPTIONAL)</label>
                    <input type="url" id="upd-photo" placeholder="https://image-url.com/photo.jpg">
                </div>
                <div class="form-group">
                    <label>BIOGRAPHY / DESIGNATION</label>
                    <textarea id="upd-bio" style="height:80px;" placeholder="Tell us about your mission..."></textarea>
                </div>
                <button class="btn solid" style="padding:12px 30px;" onclick="updateProfile()">SAVE CHANGES</button>
            </div>
        </div>
    </div>
</section>
